variables:
  common:
    # Evaluation on which hemisphere, north or south
    eval_hms:
    - nh
    - sh
    eval_sic: true
    eval_sid: true
    eval_sit: true
    eval_snd: true
    eval_sicb: true
    eval_sitrans: true
    eval_simb: true
    eval_snmb: false
    common_masking: true
    # For 'stere' and 'laea' projection, the unit of 'res' is [km], for 'lonlat', it is [degree]
    grid_info:
      proj: stere
      res: 60
    # For Antarctic, geographic regions including: Weddell, West Indian, East Indian, Ross, and AB
    # For Arctic, including: CA, CBS, LESS, KBS, EG, HBB and CAA
    sector:
    - All
    SIToolv2_RefData_path: /media/yafei/Data/Data/SIToolv2_RefData/
    model_data_path: /media/yafei/Data/Data/CMIP6/SIMbudget/
    # Compact recipe: define model list once, modules reuse by `model_group: all_models`
    model_groups:
      all_models:
      - ACCESS-CM2
      - CESM2
      - CESM2-FV2
      - CESM2-WACCM
      - CMCC-CM2-SR5
      - CMCC-ESM2
      - MRI-ESM2-0
      - NorESM2-MM

  ##################
  #     SIconc     #
  ##################
  SIconc:
    # Chose observation references, default is NSIDC_CDR
    # (the first one is the benchmark reference, the following ones are used for uncertainty estimate)
    ref_nh:
    - NSIDC_CDR_siconc_daily_nh_19790101-20241231.nc
    - OSI-450_siconc_daily_nh_19790101-20231231.nc
    ref_sh:
    - NSIDC_CDR_siconc_daily_sh_19790101-20241231.nc
    - OSI-450_siconc_daily_sh_19790101-20231231.nc
    model_var: siconc
    year_range:
    - 2003
    - 2010
    stats_metric: RMSE
    model_group: all_models
    model_file_template: '{model}/siconc_*.nc'

  ##################
  #     SIdrift    #
  ##################
  SIdrift:
    # Chose observation references
    ref_nh:
    - NSIDC_PolarPathfinder_sidrift_daily_nh_19790101-20231231.nc
    - OSI-455_sidrift_daily_nh_19910101-20201231.nc
    ref_sh:
    - NSIDC_PolarPathfinder_sidrift_daily_sh_19790101-20231231.nc
    - OSI-455_sidrift_daily_sh_19910101-20201231.nc
    # Model variable names
    model_var_u: siu
    model_var_v: siv
    # <lonlat>, <xy>, or <other> projection information, should be consistent with the model files
    model_direction:
    - null
    - null
    model_angle:
    - null
    - null
    year_range:
    - 2003
    - 2010
    stats_metric: RMSE
    model_group: all_models
    model_file_templates:
      model_file_u: '{model}/siu_*.nc'
      model_file_v: '{model}/siv_*.nc'

  ##################
  #     SIthick    #
  ##################
  SIthick:
    # Chose observation references
    ref_nh:
    - PIOMAS_nh_sithick_mon_197901-202312.nc
    - TOPAZ4b_nh_sithick_mon_199101-202312.nc
    ref_sh:
    - CTOH_sithick_monthly_sh_199404-202306.nc
    - GIOMAS_sh_sithick_mon_197901-202312.nc
    # Variable names in the observation files
    ref_var: sithick_eff
    model_var: sivol
    year_range:
    - 2003
    - 2010
    stats_metric: RMSE
    model_group: all_models
    model_file_template: '{model}/sivol_*.nc'

  ##################
  #     SNdepth    #
  ##################
  SNdepth:
    # Chose observation references
    ref_nh:
    - SnowModel-LG_nh_snod_ERA5_v01_19800801-20210731.nc
    - CTOH_sndepth_monthly_nh_199410-202304.nc
    ref_sh:
    - MPMR_SNdepth_sh_20020601-20200531_monmean.nc
    - CTOH_sndepth_monthly_sh_199404-202306.nc
    # Variable names in the observation files
    ref_var: snow_depth_eff
    model_var: sisnthick
    year_range:
    - 2003
    - 2010
    stats_metric: RMSE
    model_group: all_models
    model_file_template: '{model}/sisnthick_*.nc'

  ##################
  #     SItrans    #
  ##################
  SItrans:
    # Chose observation references
    ref_nh:
    - NSIDC_CDR_siconc_daily_nh_19790101-20241231.nc
    - OSI-450_siconc_daily_nh_19790101-20231231.nc
    ref_sh:
    - NSIDC_CDR_siconc_daily_sh_19790101-20241231.nc
    - OSI-450_siconc_daily_sh_19790101-20231231.nc
    model_var: siconc
    year_range:
    - 2003
    - 2010
    stats_metric: RMSE
    model_group: all_models
    model_file_template: '{model}/siconc_*.nc'

  ##################
  #      SICB      #
  ##################
  SICB:
    # Chose observation references
    ref_nh_sic:
    - NSIDC_CDR_siconc_daily_nh_19790101-20241231.nc
    - OSI-450_siconc_daily_nh_19790101-20231231.nc
    ref_nh_sidrift:
    - NSIDC_PolarPathfinder_sidrift_daily_nh_19790101-20231231.nc
    - OSI-455_sidrift_daily_nh_19910101-20201231.nc
    ref_sh_sic:
    - NSIDC_CDR_siconc_daily_sh_19790101-20241231.nc
    - OSI-450_siconc_daily_sh_19790101-20231231.nc
    ref_sh_sidrift:
    - NSIDC_PolarPathfinder_sidrift_daily_sh_19790101-20231231.nc
    - OSI-455_sidrift_daily_sh_19910101-20201231.nc
    model_var_sic: siconc
    model_var_u: siu
    model_var_v: siv
    year_range:
    - 2003
    - 2010
    stats_metric: RMSE
    model_group: all_models
    model_file_templates:
      model_file_sic: '{model}/siconc_*.nc'
      model_file_u: '{model}/siu_*.nc'
      model_file_v: '{model}/siv_*.nc'

  ##################
  #    SIMbudget   #
  ##################
  SIMbudget:
    # Model variables' information (one entry per variable)
    model_var_sidmassdyn: sidmassdyn
    model_var_sidmassevapsubl: sidmassevapsubl
    model_var_sidmassgrowthbot: sidmassgrowthbot
    model_var_sidmassgrowthwat: sidmassgrowthwat
    model_var_sidmasslat: sidmasslat
    model_var_sidmassmeltbot: sidmassmeltbot
    model_var_sidmassmelttop: sidmassmelttop
    model_var_sidmasssi: sidmasssi
    year_range:
    - 1980
    - 2014
    stats_metric: RMSE
    model_group: all_models
    model_file_templates:
      model_file_sidmassdyn: '{model}/sidmassdyn_*.nc'
      model_file_sidmassevapsubl: '{model}/sidmassevapsubl_*.nc'
      model_file_sidmassgrowthbot: '{model}/sidmassgrowthbot_*.nc'
      model_file_sidmassgrowthwat: '{model}/sidmassgrowthwat_*.nc'
      model_file_sidmasslat: '{model}/sidmasslat_*.nc'
      model_file_sidmassmeltbot: '{model}/sidmassmeltbot_*.nc'
      model_file_sidmassmelttop: '{model}/sidmassmelttop_*.nc'
      model_file_sidmasssi: '{model}/sidmasssi_*.nc'
      model_file_areacello: '{model}/areacello_*.nc'

